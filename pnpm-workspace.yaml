catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - playground
  - docs
  - packages/*
  - examples/*
catalogs:
  cli:
    '@antfu/eslint-config': ^6.7.3
    '@antfu/ni': ^27.0.1
    bumpp: ^10.4.1
    eslint: ^9.39.4
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.16.8
    tsx: ^4.21.0
    turbo: ^2.9.18
    typescript: ^5.9.3
    vite: ^7.3.2
  frontend:
    vue: ^3.5.13
  inlined:
    '@antfu/utils': ^9.3.0
  testing:
    tinyexec: ^1.1.1
    vitest: ^4.1.5
    vitest-package-exports: ^0.1.1
    yaml: ^2.8.3
  types:
    '@types/node': ^24.12.2
allowBuilds:
  esbuild: true
  simple-git-hooks: true
